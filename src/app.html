<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />

		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<meta name="text-scale" content="scale" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="preload"
			as="style"
			href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
			onload="this.onload=null;this.rel='stylesheet'"
		/>
		<noscript>
			<link
				href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
				rel="stylesheet"
			/>
		</noscript>

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Printy - Digitalisasi Usaha Fotokopi" />
		<meta property="og:description" content="Platform digitalisasi usaha fotokopi via WhatsApp." />
		<meta property="og:image" content="/assets/logo.png" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Printy - Digitalisasi Usaha Fotokopi" />
		<meta name="twitter:description" content="Platform digitalisasi usaha fotokopi via WhatsApp." />
		<meta name="twitter:image" content="/assets/logo.png" />

		<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@graph": [
				{
					"@type": "Organization",
					"name": "Printy",
					"url": "https://amole.my.id",
					"logo": "https://amole.my.id/assets/logo.png",
					"contactPoint": {
						"@type": "ContactPoint",
						"telephone": "+62-822-8840-4233",
						"contactType": "customer service",
						"availableLanguage": ["id", "en"]
					},
					"sameAs": []
				},
				{
					"@type": "WebSite",
					"name": "Printy",
					"url": "https://amole.my.id",
					"potentialAction": {
						"@type": "SearchAction",
						"target": "https://amole.my.id/news",
						"query-input": "required name=search_term_string"
					}
				},
				{
					"@type": "SoftwareApplication",
					"name": "Printy",
					"applicationCategory": "BusinessApplication",
					"operatingSystem": "WhatsApp, Web",
					"offers": {
						"@type": "Offer",
						"price": "0",
						"priceCurrency": "IDR"
					},
					"description": "Platform digitalisasi usaha fotokopi via WhatsApp dengan bot otomatis, dashboard manajemen, dan pembayaran terintegrasi."
				}
			]
		}
		</script>

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
